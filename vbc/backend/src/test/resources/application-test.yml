spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:vbc_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

vbc:
  upload:
    root-path: ./target/test-uploads
    video-path: ./target/test-uploads/videos
    frame-path: ./target/test-uploads/frames
    thumbnail-path: ./target/test-uploads/thumbnails
    snapshot-path: ./target/test-uploads/snapshots
